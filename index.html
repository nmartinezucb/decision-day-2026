<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pin Drop — Collaborative Map</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="header">
        <div class="header-left">
            <div class="logo-img">
                <img src="logo/DCAC all white.png">
                <img src="logo/eaop white.png">
            </div>
        </div>
        <div class="header-right">
            <span class="title">Decision Day — Live Tracker</span>
            <div class="pin-count">
                <span id="count">0</span>
                pins</div>
            <div class="status" id="statusText">Loading…</div>
        </div>
    </div>

<div id="map"></div>

<div class="legend">
    <h3>Categories</h3>
    <div class="legend-item"><div class="legend-dot" style="background:#f0c040"></div>UC</div>
    <div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div>CSU</div>
    <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div>CA Community College</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>CA Private</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div>Ivy League</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c084fc"></div>National</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f472b6"></div>Military</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fb923c"></div>Trade / Vocational</div>
    <div class="legend-item"><div class="legend-dot" style="background:#94a3b8"></div>Workforce / Other</div>
    <div class="dest-count" id="destCount"></div>
</div>

<div class="left-controls">
    <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
    <button class="zoomfit-btn" id="zoomFitBtn">⊡ Zoom to All Pins</button>
    <button class="mapstyle-btn" id="mapStyleBtn"><div class="mapstyle-dot" id="mapStyleDot" style="background:#2d2d2d"></div>
        <span id="mapStyleLabel">Light</span></button>
</div>

<div class="unmatched-panel" id="unmatchedPanel">
    <div class="unmatched-header">
        <h3>Need Placement<span id="unmatchedCount">0</span></h3>
        <span class="unmatched-hint">These students are going somewhere that is not included in this sites list.</span>
    </div>
    <div class="unmatched-list" id="unmatchedList"></div>
</div>

<div class="announcement" id="announcement">
    <div class="ann-icon">📍</div>
    <div class="ann-text">
        <span class="ann-name"></span> has added <span class="ann-location"></span>!</div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
